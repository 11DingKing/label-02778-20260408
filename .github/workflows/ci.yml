name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: talent_db
          MYSQL_USER: talent
          MYSQL_PASSWORD: talent123
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot123"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
        volumes:
          - /dev/null:/docker-entrypoint-initdb.d/dummy
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Init database schema
        run: mysql -h 127.0.0.1 -u root -proot123 talent_db < backend/schema.sql
      - name: Check
        run: cargo check
        working-directory: backend
      - name: Clippy
        run: cargo clippy -- -D warnings
        working-directory: backend
      - name: Build
        run: cargo build --release
        working-directory: backend
      - name: Test
        run: cargo test -- --test-threads=1
        working-directory: backend
        env:
          DATABASE_URL: mysql://talent:talent123@127.0.0.1:3306/talent_db

  frontend-user:
    name: Frontend User (Vue)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-user/package-lock.json
      - run: npm ci
        working-directory: frontend-user
      - run: npm run build
        working-directory: frontend-user
      - run: npx vitest --run
        working-directory: frontend-user

  frontend-admin:
    name: Frontend Admin (Vue)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-admin/package-lock.json
      - run: npm ci
        working-directory: frontend-admin
      - run: npm run build
        working-directory: frontend-admin
      - run: npx vitest --run
        working-directory: frontend-admin
